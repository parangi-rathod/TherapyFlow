[experimental]
multi_agent = true

[agents.frontend]
description = "Handles UI, component, and styling work."
config_file = ".codex/agents/frontend.toml"

[agents.backend]
description = "Handles API routes, server actions, Supabase queries, and migrations."
config_file = ".codex/agents/backend.toml"

[agents.tester]
description = "Runs Vitest unit tests and Playwright E2E coverage."
config_file = ".codex/agents/tester.toml"

[agents.reviewer]
description = "Reviews diffs for correctness, type safety, security, and conventions."
config_file = ".codex/agents/reviewer.toml"

